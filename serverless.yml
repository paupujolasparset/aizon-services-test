service: aizon-services
frameworkVersion: '2'

plugins:
  - serverless-offline


provider:
  name: aws
  runtime: nodejs12.x
  lambdaHashingVersion: 20201221

  stage: dev
  region: eu-central-1
  environment:
    SERVICES_TABLE: ${self:service}-${opt:stage, self:provider.stage}
    USER_POOL_ID: 
      Ref: UserPool
    USER_POOL_CLIENT_ID: 
      Ref: UserPoolClient
 
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:DescribeTable
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource: "*"

# =====================================================
# Lambda functions
# =====================================================
functions:
  addService:
    handler: api/services/addService.handler
    memorySize: 128
    description: Add a service
    events:
      - http: 
          path: service
          method: post
          cors: true
          integration: lambda-proxy
          authorizer: 
            type: COGNITO_USER_POOLS
            authorizerId: { Ref: MyApiGatewayAuthorizer }
  
  listServices:
    handler: api/services/listServices.handler
    memorySize: 128
    description: List all services of a given type (solution, screen or widget)
    events:
      - http: 
          path: services
          method: get
          cors: true
          integration: lambda-proxy
          authorizer: 
            # type: COGNITO_USER_POOLS
            # authorizerId: { Ref: MyApiGatewayAuthorizer }
            name: authorizer
            arn: arn:aws:cognito-idp:eu-central-1:342487230825:userpool/eu-central-1_9PKEOHcBh

  getService:
    handler: api/services/getService.handler
    memorySize: 128
    description: get a specified service
    events:
      - http: 
          path: service/{id}
          method: get
          cors: true
          integration: lambda-proxy
          authorizer: 
            type: COGNITO_USER_POOLS
            authorizerId: { Ref: MyApiGatewayAuthorizer }

  deleteService:
    handler: api/services/deleteService.handler
    memorySize: 128
    description: delete a specified service and all its childs
    events:
      - http: 
          path: service/{id}
          method: delete
          cors: true
          integration: lambda-proxy
          authorizer: 
            type: COGNITO_USER_POOLS
            authorizerId: { Ref: MyApiGatewayAuthorizer }

  updateService:
    handler: api/services/updateService.handler
    memorySize: 128
    description: update a specified service
    events:
      - http: 
          path: service/{id}
          method: put
          cors: true
          integration: lambda-proxy
          authorizer: 
            type: COGNITO_USER_POOLS
            authorizerId: { Ref: MyApiGatewayAuthorizer }

  loginUser:
    handler: api/auth/loginUser.handler
    memorySize: 128
    description: Login
    events:
      - http: 
          path: login
          method: post
          cors: true

  registerUser:
    handler: api/auth/registerUser.handler
    memorySize: 128
    description: Register
    events:
      - http: 
          path: register
          method: post
          cors: true

  logoutUser:
    handler: api/auth/logoutUser.handler
    memorySize: 128
    description: Logout
    events:
      - http: 
          path: logout
          method: post
          cors: true



resources:
  Resources:
    MyApiGatewayAuthorizer: 
      Type: AWS::ApiGateway::Authorizer
      Properties: 
        AuthorizerResultTtlInSeconds: 5
        IdentitySource: method.request.header.Authorization
        Name: MyCognitoAuthorizer
        RestApiId: 
          Ref: ApiGatewayRestApi
        Type: COGNITO_USER_POOLS
        ProviderARNs: 
          - {"Fn::Join": ["", ["arn:aws:cognito-idp:", {Ref: "AWS::Region"}, ":", {Ref: "AWS::AccountId"}, ":userpool/", Ref: UserPool]]}
    # =====================================================
    # DynamoDB table
    # =====================================================
    ServicesDynamoDbTable:
      Type: 'AWS::DynamoDB::Table'
      DeletionPolicy: Retain
      Properties:
        AttributeDefinitions:
          -
            AttributeName: "PK"
            AttributeType: "S"   
          -
            AttributeName: "SK"
            AttributeType: "S"   
        KeySchema:
          -
            AttributeName: "PK"
            KeyType: "HASH"
          -
            AttributeName: "SK"
            KeyType: "RANGE"
        ProvisionedThroughput:
          ReadCapacityUnits: 5
          WriteCapacityUnits: 5
        StreamSpecification:
          StreamViewType: "NEW_AND_OLD_IMAGES"
        TableName: ${self:provider.environment.SERVICES_TABLE}
    
    # =====================================================
    # Cognito
    # =====================================================
    # Part of Cognito that holds our users’ accounts.
    UserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${opt:stage, self:provider.stage}-user-pool
        VerificationMessageTemplate:
          DefaultEmailOption: CONFIRM_WITH_LINK
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
    # Part of Cognito that allows programmatic interaction with a user pool.
    UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${opt:stage, self:provider.stage}-user-pool-client
        UserPoolId:
          Ref: UserPool
        GenerateSecret: false
        ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH #=ADMIN_NO_SRP_AUTH
        - ALLOW_CUSTOM_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

    # Part of Cognito that sets the domain
    UserPoolDomain:
      Type: AWS::Cognito::UserPoolDomain
      Properties:
        Domain: aizon-services # what is before .auth.REGION.amazoncognito.com
        UserPoolId:
          Ref: UserPool

  Outputs:
    UserPoolId:
      Value:
        Ref: UserPool
      Export:
        Name: ${self:service}-${opt:stage, self:provider.stage}-UserPoolId

    UserPoolClientId:
      Value:
        Ref: UserPoolClient
      Export:
        Name: ${self:service}-${opt:stage, self:provider.stage}-UserPoolClientId
